<!-- EB Garamond: preconnect + direct <link> load -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
*:not(.glyphicon):not(.fa):not(.fas):not(.far):not(.fab):not(.fal):not(.material-icons),
*::before, *::after {
  font-family: 'EB Garamond', Garamond, Georgia, serif !important;
}
/* SVG <text>/<tspan> override (ggplot, ggiraph, gt sparklines, etc.).
   ggplot writes the family= argument straight into the SVG; this rule
   forces EB Garamond regardless of what the rendering library emitted. */
svg text, svg tspan, text, tspan {
  font-family: 'EB Garamond', Garamond, Georgia, serif !important;
}
</style>
